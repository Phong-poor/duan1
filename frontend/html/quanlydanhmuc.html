<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Mục | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1e1e2d;
            --bg-card: #27293d;
            --primary-color: #4CAF50;
            --secondary-color: #007bff;
            --text-light: #f8f8f8;
            --text-muted: #9faab7;
            --sidebar-color: #1e1e2d;
            --shadow-dark: rgba(0,0,0,0.5);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
        }
        header {
            background: var(--bg-card);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 5px var(--shadow-dark);
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            font-family: 'Montserrat';
            color: var(--primary-color);
            text-decoration: none;
        }
        .dashboard-layout { display:flex; }

        /* Sidebar */
        .sidebar {
            width:250px;
            background:var(--sidebar-color);
            padding-top:20px;
            box-shadow:2px 0 10px var(--shadow-dark);
        }
        .sidebar h4 {
            padding:10px 30px;
            color:var(--text-muted);
            text-transform:uppercase;
            font-size:13px;
            margin-top:25px;
        }
        .sidebar a {
            display:block;
            padding:14px 30px;
            text-decoration:none;
            color:var(--text-light);
            transition:0.25s;
            border-left:3px solid transparent;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background:rgba(76,175,80,0.15);
            color:var(--primary-color);
            border-left-color:var(--primary-color);
        }

        /* Main content */
        .main-content {
            flex:1;
            padding:40px;
        }
        .main-content h2 {
            font-size:32px;
            font-family:'Montserrat';
            font-weight:800;
            margin-bottom:25px;
            border-bottom:1px solid rgba(255,255,255,0.1);
            padding-bottom:10px;
        }
        .section-card {
            background:var(--bg-card);
            padding:25px;
            border-radius:12px;
            box-shadow:8px 8px 15px var(--shadow-dark);
            margin-bottom:35px;
        }
        .section-card h3 {
            font-size:22px;
            font-family:'Montserrat';
            color:var(--secondary-color);
            margin-top:0;
        }

        /* Form */
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:6px; text-transform:uppercase; font-size:13px; color:var(--text-muted); }
        input[type=text] {
            width:100%; padding:12px;
            border-radius:6px; background:#313349;
            border:1px solid rgba(255,255,255,0.1);
            color:var(--text-light);
        }
        .btn-submit {
            background:var(--primary-color);
            padding:10px 25px;
            border:none;
            border-radius:6px;
            font-weight:700;
            cursor:pointer;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: fixed; /* giúp cột thẳng hàng */
        }
        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        th {
            background:#313349;
            text-transform: uppercase;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Căn thẳng cột hành động */
        th:nth-child(4), td:nth-child(4) {
            width: 150px;
            text-align: center;
        }

        /* Nhóm nút */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-edit {
            background: var(--secondary-color);
            padding: 6px 12px;
            color: white;
            border-radius: 4px;
            text-decoration: none;
        }
        .btn-delete {
            background: #ff4d4f;
            padding: 6px 12px;
            color: white;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ADMIN PANEL</a>
    <div style="color:#ff4d4f; font-weight:600;">Admin</div>
</header>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h4>Quản lý</h4>
        <a href="dashboard.html">Dashboard</a>
        <a href="orders.html">Đơn hàng</a>
        <a href="customers.html">Khách hàng</a>
        <a class="active" href="categories.html">Danh mục</a>
        <a href="admin.html">Sản phẩm</a>

        <h4>Hệ thống</h4>
        <a href="settings.html">Cài đặt</a>
        <a href="notifications.html">Thông báo</a>
    </aside>

    <main class="main-content">
        <h2>Quản Lý Danh Mục</h2>

        <div class="section-card">
            <h3>Thêm Danh Mục Mới</h3>

            <div class="form-group">
                <label>Tên Danh Mục</label>
                <input type="text" placeholder="Ví dụ: Giày Nike">
            </div>

            <button class="btn-submit">Thêm Danh Mục</button>
        </div>

        <div class="section-card">
            <h3>Danh Sách Danh Mục</h3>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên Danh Mục</th>
                        <th>Ngày Tạo</th>
                        <th>Hành Động</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>DM001</td>
                        <td>Giày Nike</td>
                        <td>01/11/2025</td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn-edit" href="#">Sửa</a>
                                <a class="btn-delete" href="#">Xóa</a>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td>DM002</td>
                        <td>Giày Adidas</td>
                        <td>28/10/2025</td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn-edit" href="#">Sửa</a>
                                <a class="btn-delete" href="#">Xóa</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </main>

</div>

</body>
</html>
