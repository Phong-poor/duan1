<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - KICKS HAVEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f7f7;
            padding: 20px 0;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* --- MAIN LAYOUT --- */
        .account-layout {
            display: flex;
            gap: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        /* --- SIDEBAR (Menu Điều hướng) --- */
        .sidebar {
            flex: 0 0 250px;
            padding: 0;
            background-color: #fcfcfc;
            border-right: 1px solid #eee;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }
        .sidebar-nav {
            padding: 20px 0;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            text-decoration: none;
            color: #555;
            font-size: 15px;
            transition: background-color 0.2s, color 0.2s;
        }
        .sidebar-nav a i { margin-right: 10px; }
        .sidebar-nav a:hover { background-color: #e6f0ff; color: #007bff; }
        .sidebar-nav a.active { background-color: #007bff; color: white; font-weight: 500; }
        .sidebar-nav a.active i { color: white; }
        
        /* --- MAIN CONTENT (Nội dung chính) --- */
        .main-content {
            flex-grow: 1;
            padding: 30px;
        }
        
        /* --- TIÊU ĐỀ NỘI DUNG --- */
        .content-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        /* --- BẢNG ĐƠN HÀNG LỚN --- */
        .order-history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-bottom: 30px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.05);
        }
        .order-history-table th {
            padding: 12px 10px;
            text-align: left;
            background-color: #f2f2f2;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
        }
        .order-history-table td {
            padding: 10px 10px;
            text-align: left;
            background-color: #ffffff;
            border-bottom: 1px solid #eee;
            font-weight: 500;
            color: #1a1a1a;
        }
        
        /* Trạng thái đơn hàng */
        .status-tag { font-size: 13px; font-weight: 500; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-cancelled { color: #f44336; background-color: #ffebee; }
        .status-pending { color: #ff9800; background-color: #fff3e0; }
        .status-completed { color: #4caf50; background-color: #e8f5e9; }
        
        /* Nút Hành động */
        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: 600; transition: background-color 0.2s; margin-right: 5px; text-decoration: none; display: inline-block; text-align: center; }
        .btn-detail { background-color: #007bff; color: white; }
        .btn-buy-again { background-color: #4caf50; color: white; }
        .btn-cancel { background-color: #f44336; color: white; }
        .btn-detail:hover { background-color: #0056b3; }
        .btn-buy-again:hover { background-color: #388e3c; }
        .btn-cancel:hover { background-color: #d32f2f; }
        .order-history-table tr.active-row td { /* Đánh dấu hàng đang được chọn */
            background-color: #e6f0ff;
        }
        
        /* --- CHI TIẾT ĐƠN HÀNG CỐ ĐỊNH (PHẦN MỚI) --- */
        #selectedOrderDetail {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .detail-area h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .detail-table th {
            background-color: #f9f9f9;
            padding: 10px;
            text-align: left;
            color: #555;
            text-transform: uppercase;
        }
        .detail-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .detail-table td img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-right: 10px;
        }
        .total-summary {
            font-weight: 700;
            padding-top: 10px;
            text-align: right;
            font-size: 16px;
            color: #e53935;
        }
        
        /* --- PHÂN TRANG --- */
        .pagination-controls {
            text-align: center;
            margin-top: 20px;
        }
        .pagination-btn {
            background-color: #fff;
            border: 1px solid #ddd;
            color: #555;
            padding: 8px 12px;
            margin: 0 4px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
            font-size: 14px;
        }
        .pagination-btn:hover:not(.disabled), .pagination-btn.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .account-layout { flex-direction: column; }
            .sidebar { border-right: none; border-bottom: 1px solid #eee; }
            .order-history-table { display: block; overflow-x: auto; white-space: nowrap; }
            .main-content { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="account-layout">
            
            <div class="sidebar">
                <div class="sidebar-nav">
                    <a href="#" class="active"><i class="fas fa-shopping-bag"></i> Quản Lý Đơn Hàng</a>
                    <a href="#"><i class="fas fa-user"></i> Thông Tin Chung</a>
                </div>
            </div>
            
            <div class="main-content">
                
                <h2 class="content-title"><i class="fas fa-history"></i> Lịch Sử Đơn Hàng</h2>
                
                <table class="order-history-table" id="orderHistoryTable">
                    <thead>
                        <tr>
                            <th>Mã đơn</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        </tbody>
                </table>
                
                <div class="pagination-controls" id="paginationControls">
                    </div>
                
                <div id="selectedOrderDetail">
                    <p style="text-align: center; color: #777; margin: 50px 0;">Vui lòng chọn đơn hàng để xem chi tiết.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu (Tăng số lượng để kiểm tra phân trang)
        const allOrders = [
            { id: "KH00245", total: "4,299.86 $", status: "cancelled", date: "01/11/2025", products: [{ name: "Gaming PC X MSI i5", sl: 1, price: "3,999.95 $" }, { name: "Màn hình MSI", sl: 1, price: "299.91 $" }] },
            { id: "KH00240", total: "3,999.95 $", status: "pending", date: "15/10/2025", products: [{ name: "Nike Air Max 97 (Size 40)", sl: 1, price: "3,999.95 $" }] },
            { id: "KH00231", total: "699.92 $", status: "completed", date: "28/09/2025", products: [{ name: "Webcam HD", sl: 1, price: "399.99 $" }, { name: "Thẻ nhớ 128GB", sl: 1, price: "299.93 $" }] },
            { id: "KH00206", total: "699.92 $", status: "pending", date: "10/08/2025", products: [{ name: "Sản phẩm A", sl: 1, price: "300.00 $" }, { name: "Sản phẩm B", sl: 1, price: "399.92 $" }] },
            { id: "KH00200", total: "1,500.00 $", status: "completed", date: "05/08/2025", products: [{ name: "Giày Adidas Samba", sl: 1, price: "1,500.00 $" }] },
            { id: "KH00195", total: "990.00 $", status: "pending", date: "20/07/2025", products: [{ name: "Áo Polo Nike", sl: 2, price: "495.00 $" }] },
            { id: "KH00188", total: "2,200.00 $", status: "completed", date: "10/07/2025", products: [{ name: "Giày Converse", sl: 1, price: "2,200.00 $" }] },
            { id: "KH00170", total: "500.00 $", status: "cancelled", date: "01/07/2025", products: [{ name: "Dây giày", sl: 4, price: "125.00 $" }] },
        ];
        
        const ITEMS_PER_PAGE = 5;
        let currentPage = 1;
        let activeDetailId = null;

        const orderTableBody = document.getElementById('orderTableBody');
        const paginationControls = document.getElementById('paginationControls');
        const detailContainer = document.getElementById('selectedOrderDetail');
        
        // Hàm chuyển đổi trạng thái thành class CSS
        function getStatusClass(status) {
            switch (status) {
                case 'cancelled': return 'status-cancelled';
                case 'pending': return 'status-pending';
                case 'completed': return 'status-completed';
                default: return '';
            }
        }
        
        // Hàm hiển thị chi tiết đơn hàng (Cố định ở dưới)
        function showOrderDetail(orderId, buttonElement) {
            const order = allOrders.find(o => o.id === orderId);

            // Xóa trạng thái active cũ
            document.querySelectorAll('.order-history-table tr').forEach(row => row.classList.remove('active-row'));
            if (activeDetailId) {
                const oldActiveBtn = document.querySelector(`.btn-detail[data-active="true"]`);
                if (oldActiveBtn) oldActiveBtn.removeAttribute('data-active');
            }
            
            // Đánh dấu hàng và nút hiện tại là active
            buttonElement.closest('tr').classList.add('active-row');
            buttonElement.setAttribute('data-active', 'true');
            activeDetailId = orderId;


            let productRows = '';
            order.products.forEach(p => {
                productRows += `
                    <tr>
                        <td>
                            <img src="https://via.placeholder.com/40x40?text=P" alt="${p.name}">
                            ${p.name}
                        </td>
                        <td>1</td>
                        <td>${p.price}</td>
                        <td>TBA</td>
                    </tr>
                `;
            });

            // Tạo nội dung HTML cho chi tiết đơn hàng
            detailContainer.innerHTML = `
                <div class="detail-area">
                    <h4>Chi tiết đơn hàng #${orderId}</h4>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th style="width: 50%;">Sản phẩm</th>
                                <th>SL</th>
                                <th>Giá</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productRows}
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="4" class="total-summary">Tổng cộng: ${order.total}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
        }
        
        // Hàm hiển thị các đơn hàng cho trang hiện tại
        function displayOrders(page) {
            currentPage = page;
            orderTableBody.innerHTML = '';
            
            const start = (page - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const ordersToShow = allOrders.slice(start, end);
            
            ordersToShow.forEach(order => {
                const statusClass = getStatusClass(order.status);
                const isCancelled = order.status === 'cancelled';
                
                const actionButtons = `
                    <button class="btn-action btn-detail" onclick="showOrderDetail('${order.id}', this)">Xem chi tiết</button>
                    ${!isCancelled ? `<a href="#" class="btn-action btn-cancel">Hủy đơn</a>` : `<a href="#" class="btn-action btn-buy-again">Mua lại</a>`}
                `;

                const row = document.createElement('tr');
                row.setAttribute('data-order-id', order.id);
                row.innerHTML = `
                    <td>#${order.id}</td>
                    <td>${order.total}</td>
                    <td><span class="status-tag ${statusClass}">${order.status}</span></td>
                    <td>${actionButtons}</td>
                `;
                orderTableBody.appendChild(row);
            });
            
            renderPagination();
            
            // Sau khi render bảng mới, tự động hiển thị chi tiết của đơn hàng đầu tiên trên trang đó
            const firstRowButton = orderTableBody.querySelector('.btn-detail');
            if (firstRowButton) {
                showOrderDetail(firstRowButton.closest('tr').getAttribute('data-order-id'), firstRowButton);
            } else {
                 detailContainer.innerHTML = `<p style="text-align: center; color: #777; margin: 50px 0;">Không có đơn hàng nào.</p>`;
            }
        }
        
        // Hàm tạo các nút phân trang
        function renderPagination() {
            const pageCount = Math.ceil(allOrders.length / ITEMS_PER_PAGE);
            paginationControls.innerHTML = '';
            
            if (pageCount <= 1) return;

            // Nút Previous
            const prevButton = document.createElement('button');
            prevButton.className = `pagination-btn ${currentPage === 1 ? 'disabled' : ''}`;
            prevButton.innerHTML = '❮';
            prevButton.onclick = () => {
                if (currentPage > 1) displayOrders(currentPage - 1);
            };
            paginationControls.appendChild(prevButton);
            
            // Các nút số
            for (let i = 1; i <= pageCount; i++) {
                const pageButton = document.createElement('button');
                pageButton.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageButton.textContent = i;
                pageButton.onclick = () => displayOrders(i);
                paginationControls.appendChild(pageButton);
            }
            
            // Nút Next
            const nextButton = document.createElement('button');
            nextButton.className = `pagination-btn ${currentPage === pageCount ? 'disabled' : ''}`;
            nextButton.innerHTML = '❯';
            nextButton.onclick = () => {
                if (currentPage < pageCount) displayOrders(currentPage + 1);
            };
            paginationControls.appendChild(nextButton);
        }
        

        // Khởi tạo trang khi tải xong
        document.addEventListener('DOMContentLoaded', () => {
            displayOrders(1);
        });
    </script>
</body>
</html>
