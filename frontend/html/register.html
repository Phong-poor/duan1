<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    /* 🌄 BACKGROUND ẢNH */
    body {
      height: 100vh;
      background: url("img/banner-register.jpg") no-repeat center center/cover; /* ← Thay ảnh ở đây */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Lớp phủ làm tối và mờ ảnh */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
      z-index: 1;
    }

    .form-box {
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      width: 380px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      display: none;
      animation: fadeIn 0.4s ease;
      z-index: 2;
    }

    .form-box.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
    }

    .desc {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 14px;
      color: #444;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      transition: 0.25s;
    }

    input:focus {
      border-color: #6a5af9;
      box-shadow: 0 0 0 3px rgba(106,90,249,0.2);
      outline: none;
    }

    .btn {
      width: 100%;
      background: #6a5af9;
      padding: 12px;
      border-radius: 10px;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #5848d6;
    }

    .back {
      text-align: center;
      margin-top: 15px;
    }

    .back a {
      color: #6a5af9;
      text-decoration: none;
      font-size: 14px;
      transition: 0.25s;
    }

    .back a:hover {
      text-decoration: underline;
    }

    .otp-box {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .otp-box input {
      width: 48px;
      height: 50px;
      font-size: 22px;
      text-align: center;
      font-weight: 600;
    }
  </style>

</head>
<body>

  <div class="overlay"></div>

  <!-- FORM 1: QUÊN MẬT KHẨU -->
  <div class="form-box active" id="forgotForm">
    <div class="title">Quên Mật Khẩu</div>
    <div class="desc">Nhập email để nhận mã OTP khôi phục mật khẩu</div>

    <form>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Nhập email..." required>
      </div>

      <button type="button" class="btn" onclick="showOTP()">Gửi mã OTP</button>

      <div class="back">
        <a href="#">← Quay lại đăng nhập</a>
      </div>
    </form>
  </div>


  <!-- FORM 2: NHẬP OTP -->
  <div class="form-box" id="otpForm">
    <div class="title">Xác Thực OTP</div>
    <div class="desc">Nhập 6 số OTP đã gửi đến email của bạn</div>

    <form>
      <div class="otp-box">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
      </div>

      <button type="button" class="btn" onclick="showNewPass()">Xác nhận</button>

      <div class="back">
        <a href="#" onclick="showForgot()">← Nhập lại email</a>
      </div>
    </form>
  </div>


  <!-- FORM 3: ĐẶT MẬT KHẨU MỚI -->
  <div class="form-box" id="newPassForm">
    <div class="title">Mật Khẩu Mới</div>
    <div class="desc">Tạo mật khẩu mới cho tài khoản của bạn</div>

    <form>
      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" placeholder="Nhập mật khẩu mới..." required>
      </div>

      <div class="form-group">
        <label>Nhập lại mật khẩu</label>
        <input type="password" placeholder="Xác nhận mật khẩu..." required>
      </div>

      <button class="btn">Lưu mật khẩu</button>

      <div class="back">
        <a href="login.html">← Quay lại đăng nhập</a>
      </div>
    </form>
  </div>

  <script>
    function showOTP() {
      forgotForm.classList.remove("active");
      otpForm.classList.add("active");
    }

    function showForgot() {
      otpForm.classList.remove("active");
      forgotForm.classList.add("active");
    }

    function showNewPass() {
      otpForm.classList.remove("active");
      newPassForm.classList.add("active");
    }
  </script>

</body>
</html>
